name: Pull Request Code test

on:
  push:
    branches:
    - sporadic_test_fix

jobs:
  checks:
    name: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'
    - name: Run make test
      run: make test
