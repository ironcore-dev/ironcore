name: Pull Request Code test

on:
  pull_request:
    types: [ assigned, opened, synchronize, reopened ]

jobs:
  checks:
    name: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-go@v7
      with:
        go-version-file: 'go.mod'
    - name: Run make test
      run: make test-only
