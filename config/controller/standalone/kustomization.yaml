# Standalone install of the ironcore controller manager: same content as
# config/controller/default, plus the Namespaces (ironcore-system for the
# manager itself, ironcore-machinepool-lease for the lifecycle controller's
# lease watch) and the lease-namespace RBAC. Use this when deploying the
# controller without the apiserver. The combined config/default install
# references the Namespace and lease kustomizations directly, not via this
# wrapper.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../default
  - ../../namespaces/ironcore-system
  - ../../namespaces/machinepool-lease
