apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../default
- poollet-rbac

patches:
- path: add-args.yaml
  target:
    group: apps
    kind: Deployment
    name: bucketpoollet-controller-manager
    namespace: bucketpoollet-system
    version: v1
- path: patch-manager.yaml
