# Lets the ironcore controller manager observe pool leases. The lifecycle
# controller (see internal/controllers/compute/machinepool_lifecycle_controller.go)
# watches and reads these leases to detect failed pools.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ironcore-controller-manager:lease-reader
  namespace: ironcore-machinepool-lease
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
