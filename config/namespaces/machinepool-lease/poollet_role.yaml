# Role granting the rights every machine poollet needs in the lease namespace
# to renew its pool lease. Bound by the matching RoleBinding in this directory
# to the `compute.ironcore.dev:system:machinepools` Group, which every poollet
# joins via its client cert organization.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: compute.ironcore.dev:system:machinepools
  namespace: ironcore-machinepool-lease
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - patch
  - update
